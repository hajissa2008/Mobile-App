<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070C16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maseel">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="mfs-manifest">
<title>Maseel · Live Schedule</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;overflow:hidden;overscroll-behavior:none;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  background:#040810;color:#F0F6FC;-webkit-font-smoothing:antialiased}
:root{
  --bg0:#070C16;--bg1:#0D1525;--bg2:#131F35;--bg3:#1A2840;
  --a:#F59E0B;--a1:rgba(245,158,11,.10);--a2:rgba(245,158,11,.20);
  --bl:#3B82F6;--bl1:rgba(59,130,246,.12);--bl2:rgba(59,130,246,.25);
  --gr:#10B981;--gr1:rgba(16,185,129,.12);--gr2:rgba(16,185,129,.25);
  --rd:#EF4444;--rd1:rgba(239,68,68,.12);
  --pu:#8B5CF6;--pu1:rgba(139,92,246,.12);
  --or:#F97316;--pk:#EC4899;
  --t1:#F0F6FC;--t2:#8B9BB4;--t3:#4D5F78;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --FD:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%;
  background:var(--bg0);position:relative;overflow:hidden;
  -webkit-transform:translateZ(0);transform:translateZ(0);will-change:transform;isolation:isolate}
.frame-ov,.frame-toast,.frame-ios{position:fixed!important;z-index:100}
.tabbar{padding-bottom:calc(8px + var(--sab))!important}
.scr{padding-bottom:calc(16px + var(--sab))!important}
.sheet{padding-bottom:calc(28px + var(--sab))!important}
.screens{flex:1;position:relative;overflow:hidden;min-height:0}
.scr{position:absolute;inset:0;overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
  scrollbar-width:none;padding-bottom:16px;
  opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;transform:translateY(5px)}
.scr::-webkit-scrollbar{display:none}
.scr.active{opacity:1;pointer-events:auto;transform:none}
.tabbar{flex-shrink:0;display:flex;align-items:flex-start;
  background:rgba(7,12,22,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);padding-top:8px;padding-bottom:8px;z-index:5}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;color:var(--t3);transition:color .2s;
  font-family:inherit;padding:4px 0;position:relative;touch-action:manipulation;-webkit-appearance:none}
.tab.on{color:var(--a)}
.tind{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:18px;height:3px;border-radius:2px;background:var(--a);opacity:0;transition:opacity .2s}
.tab.on .tind{opacity:1}
.tlbl{font-size:10px;font-weight:700;letter-spacing:.4px}
/* ── CONNECTION BANNER ── */
.conn-banner{
  margin:12px 16px 0;border-radius:14px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;transition:all .3s}
.conn-banner.live{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.conn-banner.cached{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}
.conn-banner.loading{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.conn-banner.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)}
.cb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cb-live .cb-dot{background:var(--gr);animation:pulse 2s infinite}
.cb-cached .cb-dot{background:var(--a)}
.cb-loading .cb-dot{background:var(--bl);animation:pulse .8s infinite}
.cb-error .cb-dot{background:var(--rd)}
.cb-text{flex:1;font-size:12px;font-weight:500;color:var(--t2)}
.cb-text b{font-weight:700;color:var(--t1);display:block;font-size:12px}
.cb-btn{font-size:11px;font-weight:700;border:none;border-radius:8px;padding:5px 10px;
  cursor:pointer;touch-action:manipulation;-webkit-appearance:none;font-family:inherit;white-space:nowrap}
.cb-btn.live-btn{color:var(--gr);background:rgba(16,185,129,.12)}
.cb-btn.retry-btn{color:var(--a);background:var(--a1)}
.cb-btn.error-btn{color:#F87171;background:var(--rd1)}
/* ── SEARCH ── */
.sw-wrap{padding:12px 16px 8px;position:sticky;top:0;background:var(--bg0);z-index:3}
.sw-box{display:flex;align-items:center;gap:8px;background:var(--bg2);
  border:1px solid var(--bd);border-radius:14px;padding:0 14px;height:40px}
.sw-box input{flex:1;background:none;border:none;outline:none;font-family:inherit;
  font-size:16px;color:var(--t1);min-width:0}
.sw-box input::placeholder{color:var(--t3)}
.sw-box svg{flex-shrink:0;color:var(--t3)}
/* ── PAGE HEADERS ── */
.ph-hdr{padding:16px 20px 4px}
.ph-date{font-family:var(--FD);font-size:11px;font-weight:700;color:var(--a);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.ph-title{font-family:var(--FD);font-size:24px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
/* ── NOTIFICATION ── */
.notif{margin:0 16px 14px;background:linear-gradient(135deg,rgba(245,158,11,.14),rgba(245,158,11,.06));
  border:1px solid var(--a2);border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:11px;
  transition:opacity .3s,max-height .35s,margin .35s,padding .35s;overflow:hidden;max-height:120px}
.notif.gone{opacity:0;max-height:0;margin:0 16px;padding:0}
.n-ico{width:38px;height:38px;background:var(--a);border-radius:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#040810}
.n-body{flex:1}
.n-body b{font-family:var(--FD);font-size:13px;font-weight:700;display:block}
.n-body s{font-size:11px;color:var(--t2);display:block;margin-top:2px;text-decoration:none}
.n-x{background:none;border:none;cursor:pointer;color:var(--t3);padding:5px;display:flex;
  touch-action:manipulation;-webkit-appearance:none}
/* ── STATS ── */
.stats{display:flex;gap:8px;padding:0 16px 14px}
.stat{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:11px 6px;text-align:center}
.sv{font-family:var(--FD);font-size:22px;font-weight:800;line-height:1}
.sl{font-size:10px;color:var(--t2);margin-top:3px;font-weight:500}
.kpis{display:flex;gap:6px;padding:0 16px 10px}
.kpi{flex:1;background:var(--bg2);border:2px solid transparent;border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;touch-action:manipulation;transition:border-color .2s,background .2s;-webkit-appearance:none}
.kpi:active{background:var(--bg3)}
.kpi-on{background:var(--bg3);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.kv{font-family:var(--FD);font-size:18px;font-weight:800;line-height:1}
.kl{font-size:8px;margin-top:4px;font-weight:600;line-height:1.2;text-transform:uppercase;letter-spacing:.2px}
/* ── GROUP HEADER ── */
.pg-sec{display:flex;align-items:center;gap:8px;padding:6px 20px 7px}
.pg-dot{width:6px;height:6px;border-radius:50%}
.pg-nm{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.3px;text-transform:uppercase}
.pg-ct{font-size:10px;color:var(--t3);margin-left:auto}
/* ── ACTIVITY CARD ── */
.card{margin:0 16px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;
  padding:12px 14px;cursor:pointer;position:relative;overflow:hidden;touch-action:manipulation;
  transition:background .12s;-webkit-transform:translateZ(0);transform:translateZ(0)}
.card:active{background:var(--bg3)}
.stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px}
.crow{display:flex;align-items:flex-start;gap:10px}
.circ{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:1px;touch-action:manipulation;
  -webkit-appearance:none;background:transparent;cursor:pointer;transition:all .15s}
.ci-ip{border-color:#3B82F6!important;background:rgba(59,130,246,.12)!important}
.ci-dn{border-color:#10B981!important;background:#10B981!important}
.ci-pi{border-color:#F59E0B!important;background:rgba(245,158,11,.12)!important}
.ci-bk{border-color:#EF4444!important;background:rgba(239,68,68,.12)!important}
.ci-fi{border-color:#F87171!important;background:rgba(248,113,113,.12)!important}
.cinfo{flex:1;min-width:0}
.ctit{font-family:var(--FD);font-size:13px;font-weight:600;line-height:1.3;word-break:break-word}
.cdisc{font-size:11px;color:var(--t3);margin-top:2px}
.cbdgs{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.b{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px}
.b-ns{background:rgba(75,85,99,.2);color:#9CA3AF}
.b-ip{background:rgba(59,130,246,.12);color:#60A5FA;border:1px solid rgba(59,130,246,.2)}
.b-dn{background:rgba(16,185,129,.12);color:#34D399;border:1px solid rgba(16,185,129,.2)}
.b-fi{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.2)}
.b-pi{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
.b-dt{background:rgba(255,255,255,.06);color:var(--t2)}
.b-td{background:rgba(245,158,11,.1);color:var(--a);border:1px solid rgba(245,158,11,.2)}
.b-ov{background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.b-c{background:rgba(255,255,255,.06);color:var(--t3)}
.cpbar{margin-top:7px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.cpfill{height:100%;border-radius:2px;transition:width .3s}
.fade-c{opacity:.5}
/* ── OVERVIEW ── */
.ovr{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;padding:14px}
.ovr-r{display:flex;justify-content:space-between;margin-bottom:8px}
.ovr-lbl{font-size:12px;font-weight:600;color:var(--t2)}
.ovr-pct{font-family:var(--FD);font-size:14px;font-weight:800;color:var(--a)}
.ovr-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.ovr-fill{height:100%;background:linear-gradient(90deg,#F59E0B,#FCD34D);border-radius:3px}
.ovr-dates{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--t3)}
.ph-pills{display:flex;gap:3px;margin-top:10px}
.ph-pill{flex:1;height:5px;border-radius:3px;position:relative;overflow:hidden}
.ph-pill-bg{position:absolute;inset:0;background:rgba(255,255,255,.08)}
.ph-pill-fill{position:absolute;inset:0 auto 0 0;border-radius:3px}
/* ── ACCORDION ── */
.acc{margin:0 16px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;overflow:hidden;
  transition:border-color .2s;-webkit-transform:translateZ(0);transform:translateZ(0)}
.acc.open{border-color:rgba(245,158,11,.22)}
.acc-hd{padding:12px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;transition:background .12s}
.acc-hd:active{background:var(--bg3)}
.acc-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acc-info{flex:1}
.acc-name{font-family:var(--FD);font-size:13px;font-weight:700}
.acc-sub{font-size:10px;color:var(--t3);margin-top:2px}
.acc-rt{display:flex;align-items:center;gap:7px}
.acc-pct{font-family:var(--FD);font-size:13px;font-weight:800}
.acc-chv{color:var(--t3);transition:transform .28s;flex-shrink:0}
.acc.open .acc-chv{transform:rotate(180deg)}
.acc-prog{height:2px;background:rgba(255,255,255,.06);margin:0 15px}
.acc-body{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
.acc.open .acc-body{max-height:9999px}
.disc-hd{padding:8px 15px 5px;display:flex;align-items:center;gap:6px;
  border-top:1px solid var(--bd);background:rgba(255,255,255,.015)}
.disc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.disc-nm{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.disc-ct{font-size:10px;color:var(--t3);margin-left:auto}
.acc-row{padding:9px 15px;border-top:1px solid var(--bd);display:flex;align-items:center;
  gap:9px;cursor:pointer;touch-action:manipulation;transition:background .12s}
.acc-row:active{background:var(--bg3)}
.a-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--bd2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.a-dot.ip{border-color:#3B82F6;background:rgba(59,130,246,.12)}
.a-dot.dn{border-color:#10B981;background:#10B981}
.a-dot.bk{border-color:#EF4444;background:rgba(239,68,68,.12)}
.a-ri{flex:1;min-width:0}
.a-rt{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-rm{font-size:10px;color:var(--t3);margin-top:1px}
/* ── PROFILE ── */
.prof-hd{padding:20px 20px 16px;display:flex;align-items:center;gap:15px}
.avatar{width:58px;height:58px;border-radius:17px;flex-shrink:0;
  background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;
  justify-content:center;font-family:var(--FD);font-size:21px;font-weight:800;color:#040810}
.p-name{font-family:var(--FD);font-size:17px;font-weight:800}
.p-role{font-size:12px;color:var(--t2);margin-top:2px}
.p-proj{font-size:11px;color:var(--t3);margin-top:2px}
/* data source card */
.ds-card{margin:0 16px 14px;background:var(--bg2);border-radius:18px;padding:14px;transition:border-color .3s}
.ds-card.live-card{border:1px solid rgba(16,185,129,.3)}
.ds-card.cached-card{border:1px solid rgba(245,158,11,.25)}
.ds-card.err-card{border:1px solid rgba(239,68,68,.25)}
.ds-top{display:flex;align-items:center;gap:11px}
.ds-ico{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ds-info{flex:1}
.ds-info b{font-family:var(--FD);font-size:13px;font-weight:700;display:block}
.ds-status{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;margin-top:3px}
.dpulse{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dpulse.live{background:#10B981;animation:pulse 2s infinite}
.dpulse.cached{background:#F59E0B}
.dpulse.err{background:#EF4444}
.ref-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;
  border:none;border-radius:9px;padding:7px 12px;cursor:pointer;font-family:inherit;
  touch-action:manipulation;-webkit-appearance:none;transition:opacity .2s;white-space:nowrap}
.ref-btn:active{opacity:.7}
.ds-prog{margin-top:11px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.ds-prog-fill{height:100%;background:var(--gr);border-radius:2px;transition:width .4s}
.ds-meta{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
.ds-meta span{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px}
/* upload */
.up-card{margin:0 16px 14px;background:rgba(245,158,11,.06);border:1px dashed rgba(245,158,11,.3);
  border-radius:18px;padding:14px;cursor:pointer;touch-action:manipulation;transition:background .2s}
.up-card:active{background:rgba(245,158,11,.1)}
.up-inner{display:flex;align-items:center;gap:11px}
.up-ico{width:36px;height:36px;background:var(--a1);border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--a)}
.up-text b{font-family:var(--FD);font-size:13px;font-weight:700;display:block;color:var(--t1)}
.up-text s{font-size:11px;color:var(--t2);display:block;margin-top:2px;text-decoration:none}
.sgrp{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;overflow:hidden}
.sg-lbl{padding:11px 15px 7px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.srow{padding:12px 15px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stt{flex:1}
.stt b{font-size:13px;font-weight:500;display:block}
.stt s{font-size:11px;color:var(--t3);display:block;margin-top:2px;text-decoration:none}
.tog{width:44px;height:26px;border-radius:13px;background:#2D3748;position:relative;
  cursor:pointer;transition:background .25s;border:none;flex-shrink:0;
  -webkit-appearance:none;touch-action:manipulation}
.tog.on{background:var(--a)}
.tog::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(18px)}
/* ── SHEET ── */
.frame-ov{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.frame-ov.open{opacity:1;pointer-events:auto}
.sheet{width:100%;max-height:90%;background:#0F1726;border-radius:28px 28px 0 0;
  border-top:1px solid var(--bd2);overflow-y:scroll;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;overscroll-behavior-y:contain;padding-bottom:28px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
.sheet::-webkit-scrollbar{display:none}
.frame-ov.open .sheet{transform:none}
.sh-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:13px auto 8px}
.sh-hd{padding:7px 18px 14px;border-bottom:1px solid var(--bd)}
.sh-tag{font-size:11px;font-weight:700;color:var(--a);background:var(--a1);
  padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:7px}
.sh-id{font-size:10px;color:var(--t3);margin-left:8px;font-family:monospace;letter-spacing:.5px}
.sh-title{font-family:var(--FD);font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.25}
.sh-disc{font-size:11px;color:var(--t2);margin-top:3px}
.sh-meta{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.mchip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);
  background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:4px 9px}
.sh-sec{padding:13px 18px 0}
.sh-sl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px}
.s-opts{display:flex;flex-direction:column;gap:7px}
.sopt{display:flex;align-items:center;gap:10px;padding:11px 13px;
  background:var(--bg1);border:2px solid var(--bd);border-radius:12px;
  cursor:pointer;touch-action:manipulation;transition:background .13s,border-color .13s}
.sopt:active{opacity:.85}
.sopt.s-ns{border-color:#6B7280;background:rgba(75,85,99,.1)}
.sopt.s-ip{border-color:#3B82F6;background:rgba(59,130,246,.12)}
.sopt.s-dn{border-color:#10B981;background:rgba(16,185,129,.12)}
.sopt.s-fi{border-color:#F87171;background:rgba(248,113,113,.12)}
.sopt.s-pi{border-color:#F59E0B;background:rgba(245,158,11,.12)}
.so-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.so-lbl{font-size:13px;font-weight:500}

function inspQty(id){var o=ST.overrides[id];if(!o||!o.ins)return 0;return o.ins.filter(function(x){return x.r==='Passed';}).reduce(function(s,x){return s+x.q;},0);}

function addIns(id,qty,result){
  if(!ST.overrides[id])ST.overrides[id]={};
  if(!ST.overrides[id].ins)ST.overrides[id].ins=[];
  ST.overrides[id].ins.push({q:qty,r:result,d:new Date().toISOString()});
  saveOverrides();
  var a=acOf(id),tot=a?a.totalQty||readyQty(id):0,ins=inspQty(id);
  if(tot>0&&ins>0){
    if(ins>=tot){ST.overrides[id].st='Done';ST.overrides[id].pc=100;showToast('✓ All quantity inspected — status set to Done');}
    else{ST.overrides[id].st='Partially Inspected';ST.overrides[id].pc=Math.round(ins/tot*100);showToast('! Partially inspected — status updated');}
    saveOverrides();
  }
  ST.syncQ++;updBadge();
  if(!ST._syncTimer)ST._syncTimer=setTimeout(function(){ST._syncTimer=null;syncAll();},5000);
}

function shareUrlToEncoded(url){
  var u = url.split('?')[0];
  var bytes = new TextEncoder().encode(u);
  var binary = '';
  for(var i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
  var b = btoa(binary).replace(/=+$/,'').replace(/\+/g,'-').replace(/\//g,'_');
  return 'u!' + b;
}

async function getGraphToken(){
  if(!AUTH.instance||!AUTH.user)return null;
  if(AUTH.graphToken&&Date.now()<AUTH.graphTokenExp)return AUTH.graphToken;
  try{
    var resp = await AUTH.instance.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:AUTH.user});
    AUTH.graphToken = resp.accessToken;
    AUTH.graphTokenExp = Date.now() + (resp.expiresOn?resp.expiresOn.getTime()-Date.now():3000000);
    return AUTH.graphToken;
  }catch(e){
    console.log('[graph] silent failed, redirecting for consent');
    sessionStorage.setItem('maseel_pending','token');
    AUTH.instance.acquireTokenRedirect({scopes:[GRAPH_SCOPE],account:AUTH.user});
    return null;
  }
}

var SITE_ID = null;
var SCHED_LIST_ID = null;

/* Parse the SharePoint site hostname and path from the site URL */
function siteInfoFromShareUrl(url){
  try{
    var u=new URL(url);
    var host=u.hostname;
    /* Extract site-relative path e.g. /sites/Alenshaiah */
    var path=u.pathname.replace(/\/Lists\/.*$/,'');
    /* Remove trailing slash */
    if(path.endsWith('/'))path=path.slice(0,-1);
    return {host:host, path:path||'/'};
  }catch(e){return null;}
}

/* Resolve site ID from the SharePoint URL (one-time) */
async function ensureSiteId(){
  if(SITE_ID)return true;
  var token=await getGraphToken();
  if(!token){DS.errDetail='No Graph token for site lookup';console.error('[list] ensureSiteId: no token');return false;}
  try{
    var info=siteInfoFromShareUrl(SP_SHARE_URL);
    if(!info){DS.errDetail='Could not parse site URL: '+SP_SHARE_URL;throw new Error('Could not parse share URL');}
    var res=await fetch(GRAPH_SITES_BASE+info.host+':'+info.path, {headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){DS.errDetail='Site lookup HTTP '+res.status;throw new Error('Site lookup failed: '+res.status);}
    var site=await res.json();
    SITE_ID=site.id;
    try{localStorage.setItem('maseel_site',SITE_ID);localStorage.setItem('maseel_site_url',SP_SHARE_URL);}catch(e){}
    return true;
  }catch(e){console.error('[list] ensureSiteId error:', e);DS.errDetail=DS.errDetail||e.message;return false;}
}

/* Find the existing list or create it from the Excel file */
async function ensureLists(){
  if(SCHED_LIST_ID)return true;
  if(!SITE_ID&&!(await ensureSiteId())){DS.errDetail='ensureSiteId failed';return false;}
  var token=await getGraphToken();
  if(!token){DS.errDetail='No Graph token';return false;}
  try{
    var res=await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists?$select=id,displayName', {headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){DS.errDetail='List lookup HTTP '+res.status;throw new Error('List lookup failed: '+res.status);}
    var data=await res.json();
    if(data.value){
      for(var i=0;i<data.value.length;i++){
        if(data.value[i].displayName===LIST_NAME){SCHED_LIST_ID=data.value[i].id;break;}
      }
    }
    if(SCHED_LIST_ID){
      try{localStorage.setItem('maseel_sched_list',SCHED_LIST_ID);localStorage.setItem('maseel_site_url',SP_SHARE_URL);}catch(e){}
      return true;
    }
    DS.errDetail='List "'+LIST_NAME+'" not found, creating…';
    return await createAndMigrateLists(token);
  }catch(e){console.error('[list] ensureLists error:', e);DS.errDetail=DS.errDetail||e.message;return false;}
}



/* Fetch all activities from the SharePoint list */
async function fetchListActivities(token){
  var items=[];
  var url=GRAPH_SITES_BASE+SITE_ID+'/lists/'+SCHED_LIST_ID+'/items?expand=fields&$top=5000';
  while(url){
    var res=await fetch(url, {headers:{'Authorization':'Bearer '+token}});
    if(!res.ok)throw new Error('List fetch failed: '+res.status);
    var data=await res.json();
    if(data.value)items=items.concat(data.value);
    url=data['@odata.nextLink']||null;
  }
  return items;
}

/* Fetch Excel file (used only for first migration) */
async function fetchExcelBytes(token){
  try{
    var encoded=shareUrlToEncoded(SP_EXCEL_URL);
    var res=await fetch(GRAPH_SHARE_BASE+encoded+'/driveItem?$select=id,parentReference', {headers:{'Authorization':'Bearer '+token}});
    if(!res.ok)return null;
    var item=await res.json();
    var driveId=item.parentReference.driveId;
    var itemId=item.id;
    var dl=await fetch('https://graph.microsoft.com/v1.0/drives/'+driveId+'/items/'+itemId+'/content?cb='+Date.now(), {headers:{'Authorization':'Bearer '+token}});
    if(!dl.ok)return null;
    return await dl.arrayBuffer();
  }catch(e){return null;}
}

/* Create the list and import data from Excel */
async function createAndMigrateLists(token){
  try{
    showToast('Creating list & importing from Excel…');
    var schRes=await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists', {
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({
        displayName:LIST_NAME,
        description:'P6 schedule imported from Excel',
        columns:[
          {name:'ActivityID',text:{maxLength:255}},
          {name:'Phase',text:{maxLength:50}},
          {name:'Duration',number:{}},
          {name:'BaselineStart',dateTime:{format:'dateTime'}},
          {name:'BaselineFinish',dateTime:{format:'dateTime'}},
          {name:'Start',dateTime:{format:'dateTime'}},
          {name:'Finish',dateTime:{format:'dateTime'}},
          {name:'Float',number:{}},
          {name:'Responsible',text:{maxLength:500}},
          {name:'TotalQty',number:{}},
          {name:'Unit',text:{maxLength:50}},
          {name:'Status',text:{maxLength:50}},
          {name:'Progress',number:{}},
          {name:'Notes',text:{maxLength:2000,allowMultipleLines:true}},
          {name:'ReadyQty',number:{}},
          {name:'InspectedQty',number:{}},
          {name:'RemainingQty',number:{}},
          {name:'Timestamp',dateTime:{format:'dateTime'}}
        ]
      })
    });
    if(!schRes.ok){DS.errDetail='Create list HTTP '+schRes.status;throw new Error('Create list failed: '+schRes.status);}
    var sch=await schRes.json();
    SCHED_LIST_ID=sch.id;
    try{localStorage.setItem('maseel_sched_list',SCHED_LIST_ID);localStorage.setItem('maseel_site_url',SP_SHARE_URL);}catch(e){}
    /* Import from Excel */
    DS.errDetail='Downloading Excel…';
    var buf=await fetchExcelBytes(token);
    if(!buf){DS.errDetail='Excel download failed';showToast('Could not read Excel file');return false;}
    var parsed=parseP6Buffer(buf);
    if(!parsed.activities.length){DS.errDetail='No activities in Excel';throw new Error('No activities in Excel');}
    DS.errDetail='Importing '+parsed.activities.length+' activities…';
    for(var ai=0;ai<parsed.activities.length;ai++){
      var a=parsed.activities[ai];
      await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists/'+SCHED_LIST_ID+'/items', {
        method:'POST',
        headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
        body:JSON.stringify({fields:{
          ActivityID:a.id, Title:a.title, Phase:a.ph,
          Duration:a.dur, BaselineStart:a.bls||null, BaselineFinish:a.blf||null,
          Start:a.s, Finish:a.f, Float:a.flt,
          Responsible:a.responsibleList?a.responsibleList.join('; '):'',
          TotalQty:a.totalQty||null, Unit:a.unit||'',
          Status:a.st, Progress:a.pc, Notes:a.disc||'',
          Timestamp:new Date().toISOString()
        }})
      });
    }
    showToast('✓ Created '+LIST_NAME+' with '+parsed.activities.length+' activities');
    return true;
  }catch(e){console.error('[list] createAndMigrate error:', e);DS.errDetail=DS.errDetail||e.message;showToast('Migration failed: '+e.message);return false;}
}

/* Update a single list item's fields */
async function updateListItem(token, itemId, fields){
  var res=await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists/'+SCHED_LIST_ID+'/items/'+itemId+'/fields', {
    method:'PATCH',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify(fields)
  });
  return res.ok;
}

/* Convert list item fields to our activity format */
function listItemToActivity(fields, itemId){
  var a={
    id:fields.Activity_x0020_ID||'',
    title:fields.Title||fields.Activity_x0020_Name||'',
    ph:'',
    dur:fields.Original_x0020_Duration,
    bls:null,
    blf:null,
    s:fields.Start?fields.Start.split('T')[0]:null,
    f:fields.Finish?fields.Finish.split('T')[0]:null,
    flt:fields.Total_x0020_Float,
    responsibleList:(fields.responsible||'').split(/[,;]+/).map(function(x){return x.trim().toLowerCase();}).filter(function(x){return x;}),
    totalQty:fields.QTY,
    unit:fields.Unit||'',
    st:fields.STATUS||'Not Started',
    pc:0,
    disc:fields.NOTE||'',
    _listItemId:itemId
  };
  return a;
}

/* Convert list item fields to our phase format */
function listItemToPhase(fields, itemId){
  return {
    id:fields.PhaseID||'',
    name:fields.PhaseName||'',
    order:fields.Order||0,
    color:fields.Color||'#6B7280',
    s:fields.Start?fields.Start.split('T')[0]:null,
    f:fields.Finish?fields.Finish.split('T')[0]:null,
    progress:fields.Progress||0,
    status:fields.Status||'In Progress',
    _listItemId:itemId
  };
}

function loadAuth(){
  try{
    var c=localStorage.getItem('msal_cfg');
    if(c){AUTH._cfg=JSON.parse(c);AUTH.enabled=true;AUTH.clientId=AUTH._cfg.clientId||'';AUTH.tenantId=AUTH._cfg.tenantId||'';}
    var p=localStorage.getItem('msal_profile');
    if(p)AUTH._profile=p;
    /* Clear old stale caches from previous sessions */
    try{localStorage.removeItem('maseel_site');localStorage.removeItem('maseel_sched_list');localStorage.removeItem('maseel_phase_list');localStorage.removeItem('maseel_site_url');}catch(e){}
  }catch(e){}
  /* Pre-configured defaults */
  if(!AUTH.clientId)AUTH.clientId='1b3e37d8-0ba9-44b2-9033-68e4d8068a87';
  if(!AUTH.tenantId)AUTH.tenantId='684547e2-bb8b-450a-a3e1-3a6bc15e9471';
  if(!AUTH._cfg){saveAuthCfg();}
}

function saveAuthCfg(){
  AUTH._cfg={clientId:AUTH.clientId,tenantId:AUTH.tenantId};
  AUTH.enabled=!!(AUTH.clientId&&AUTH.tenantId);
  try{localStorage.setItem('msal_cfg',JSON.stringify(AUTH._cfg));}catch(e){}
  if(!AUTH.enabled){try{localStorage.removeItem('msal_profile');}catch(e){}AUTH._profile='';}
}

function initMsal(){
  if(!AUTH.enabled||!AUTH.clientId||!AUTH.tenantId)return;
  if(typeof msal==='undefined')return;
  if(AUTH.instance)return;
  var redirectUri=window.location.origin+window.location.pathname;
  AUTH.instance=new msal.PublicClientApplication({auth:{clientId:AUTH.clientId,authority:'https://login.microsoftonline.com/'+AUTH.tenantId,redirectUri:redirectUri}});
  AUTH._redirectResolved = new Promise(function(rr){
    AUTH._doneRedirect = false;
    AUTH.instance.handleRedirectPromise().then(function(resp){
      if(!resp||!resp.account){rr();return;}
      AUTH.user=resp.account;AUTH._profile=resp.account.name||resp.account.username||'';try{localStorage.setItem('msal_profile',AUTH._profile);}catch(e){}
      AUTH._doneRedirect = true;
      fetchLive().then(function(){
        try{rToday();}catch(e){}try{rTimeline();}catch(e){}try{rProfile();}catch(e){}
        hideLoginScreen();
        var pending=sessionStorage.getItem('maseel_pending');
        if(pending){sessionStorage.removeItem('maseel_pending');
          if(pending==='token'){showToast('✓ Graph permission granted');try{rProfile();}catch(e){}setTimeout(syncAll,500);}
        }
        rr();
      }).catch(function(err){
        showToast('Failed to load schedule: '+err.message);
        rr();
      });
    }).catch(function(){rr();});
  });
  var accounts=AUTH.instance.getAllAccounts();
  if(accounts&&accounts.length>0){AUTH.user=accounts[0];}
}

function showLoginScreen(){
  var ls=document.getElementById('login-screen');
  if(ls)ls.classList.remove('hidden');
  var app=document.getElementById('app');
  if(app)app.style.display='none';
}
function hideLoginScreen(){
  var ls=document.getElementById('login-screen');
  if(ls)ls.classList.add('hidden');
  var app=document.getElementById('app');
  if(app)app.style.display='';
}

function loginMsal(){
  if(!AUTH.instance)return;
  var btn=document.getElementById('ls-btn');
  if(btn){btn.disabled=true;btn.innerHTML='Signing in…';}
  AUTH.instance.loginRedirect({scopes:['User.Read','openid','profile',GRAPH_SCOPE]});
}

function logoutMsal(){
  AUTH.user=null;AUTH._profile='';
  try{localStorage.removeItem('msal_profile');}catch(e){}
  try{rProfile();}catch(e){}
  showLoginScreen();
}

try{loadAuth();initMsal();}catch(e){}
try{loadOverrides();}catch(e){}

/* ══════════════════════════════════════════
   P6 PARSER  (mirrors the Python extraction logic)
══════════════════════════════════════════ */
var PHASE_KEY = {
  'Con.Phase (1)':'P1','Con.Phase (2)':'P2','Con.Phase (3)':'P3',
  'Con.Phase (4)':'P4','Con.Phase (5)':'P5',
  'Shopdrawing':'SD','Mobilization Work':'MOB',
  'Contractual Milestones':'ML','Control Milestones':'ML','Milestones':'ML'
};
var PHASES_DEF = [
  {id:'MOB',name:'Mobilization',order:0,color:'#6B7280'},
  {id:'SD', name:'Shop Drawings',order:1,color:'#8B5CF6'},
  {id:'P1', name:'Construction Phase 1',order:2,color:'#F59E0B'},
  {id:'P2', name:'Construction Phase 2',order:3,color:'#3B82F6'},
  {id:'P3', name:'Construction Phase 3',order:4,color:'#10B981'},
  {id:'P4', name:'Construction Phase 4',order:5,color:'#EF4444'},
  {id:'P5', name:'Construction Phase 5',order:6,color:'#F97316'},
  {id:'ML', name:'Milestones',order:7,color:'#EC4899'}
];
var MONTHS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
var LEAF_RE = /^[A-Z0-9]+\.[A-Z0-9.]+\d+$/;

function xlDateToISO(v) {
  if (!v && v !== 0) return null;
  if (typeof v === 'number') {
    /* Excel date serial → JS date */
    var d = new Date(Math.round((v - 25569) * 86400 * 1000));
    var y = d.getUTCFullYear(), m = d.getUTCMonth()+1, dd = d.getUTCDate();
    return y+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;
  }
  if (typeof v === 'string') {
    var s = v.replace(/ A$/,'').replace(/\*/g,'').trim();
    /* "01-Oct-25" or "01-Oct-2025" */
    var mt = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{2,4})$/);
    if (mt) {
      var yr = mt[3].length===2 ? 2000+parseInt(mt[3]) : parseInt(mt[3]);
      var mo = MONTHS[mt[2]]; if (!mo) return null;
      return yr+'-'+(mo<10?'0':'')+mo+'-'+(parseInt(mt[1])<10?'0':'')+parseInt(mt[1]);
    }
    /* ISO already */
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  }
  return null;
}

function isActual(v) { return typeof v==='string' && /\s*A$/.test(v.trim()); }

function parseP6Buffer(buffer) {
  if (typeof XLSX === 'undefined') throw new Error('SheetJS not loaded');
  var wb = XLSX.read(new Uint8Array(buffer), {type:'array', raw:true, cellDates:false});
  var sn = wb.SheetNames;
  var ws = wb.Sheets[sn[0]];
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
  if (rows.length < 2) throw new Error('Empty sheet');

  /* Find all columns by header name (supports column reordering/insertion) */
  var colTq=-1, colUnit=-1, colId=0, colTitle=1, colDur=2, colBls=3, colBlf=4, colStart=5, colFin=6, colFloat=7, colResp=8;
  if(rows[0]){
    for(var ci=0;ci<rows[0].length;ci++){
      var hh=rows[0][ci];
      if(hh==null)continue;
      var hs=String(hh).trim().toUpperCase();
      if(hs==='TOTAL QUANTITY'||hs==='QTY'||hs==='QUANTITY')colTq=ci;
      else if(hs==='UNIT'||hs==='UOM'||hs==='UNIT OF MEASUREMENT')colUnit=ci;
      else if(hs==='ACTIVITY ID'||hs==='TASK ID'||hs==='ID'||hs==='WBS')colId=ci;
      else if(hs==='ACTIVITY NAME'||hs==='ACTIVITY'||hs==='TASK NAME'||hs==='TITLE')colTitle=ci;
      else if(hs==='ORIGINAL DURATION'||hs==='DURATION'||hs==='DUR')colDur=ci;
      else if(hs==='BL START'||hs==='BASELINE START'||hs==='PLANNED START')colBls=ci;
      else if(hs==='BL FINISH'||hs==='BASELINE FINISH'||hs==='PLANNED FINISH')colBlf=ci;
      else if(hs==='START'||hs==='ACTUAL START')colStart=ci;
      else if(hs==='FINISH'||hs==='ACTUAL FINISH')colFin=ci;
      else if(hs==='TOTAL FLOAT'||hs==='FLOAT')colFloat=ci;
      else if(hs==='RESPONSIBLE'||hs==='RESPONSIBLE RESOURCE'||hs==='RESOURCE'||hs==='RESPONSIBILITY'||hs==='ASSIGNED TO'||hs==='ASSIGNED RESOURCE'||hs==='RESPONSIBLE PERSON'||hs==='RESOURCES'||hs==='OWNER')colResp=ci;
    }
  }

  var pathStack = {};
  var phaseBuckets = {};
  PHASES_DEF.forEach(function(p){phaseBuckets[p.id]=[];});

  for (var i=1; i<rows.length; i++) {
    var row = rows[i];
    var actId = row[colId]; if (actId==null) continue;
    var raw = String(actId);
    var stripped = raw.trim();
    var indent = raw.length - stripped.length;
    var isLeaf = LEAF_RE.test(stripped);

    if (isLeaf) {
      /* Build path from ancestor groups */
      var path = [];
      var lvls = Object.keys(pathStack).map(Number).filter(function(l){return l<indent;}).sort(function(a,b){return a-b;});
      for (var li=0; li<lvls.length; li++) path.push(pathStack[lvls[li]].trim());

      var bl_s = xlDateToISO(row[colBls]), bl_f = xlDateToISO(row[colBlf]);
      var st_v = row[colStart], fn_v = row[colFin];
      var s = xlDateToISO(st_v), f = xlDateToISO(fn_v);
      var flt = row[colFloat]!=null ? Math.round(parseFloat(row[colFloat])) : null;
      var started = isActual(st_v);

      /* Resolve phase + discipline */
      var phId = null, disc = null;
      for (var pi=0; pi<path.length; pi++) {
        if (PHASE_KEY[path[pi]]) { phId=PHASE_KEY[path[pi]]; disc=path[pi+1]||null; break; }
      }
      if (!phId) continue;

      var es = s||bl_s, ef = f||bl_f;
      if (!es && !ef) continue;

      /* Infer status */
      var status;
      if (ef && ef<DATA_DATE) status='Done';
      else if (started) status='In Progress';
      else if (es && es<DATA_DATE && ef && ef>=DATA_DATE) status='In Progress';
      else if (flt!=null && flt<-10) status='In Progress';
      else status='Not Started';

      var tq=null;
      if(colTq>=0&&row[colTq]!=null&&row[colTq]!=='')tq=parseFloat(row[colTq])||null;
        var respRaw = (row[colResp]||'').toString().trim();
        var respList = respRaw ? respRaw.toLowerCase().split(/[;,]+/).map(function(s){return s.trim();}).filter(Boolean) : [];
        phaseBuckets[phId].push({
          id:stripped, ph:phId, disc:disc||'',
          title:(row[colTitle]||'').trim(),
          s:es||DATA_DATE, f:ef||DATA_DATE,
          st:status,
          pc:status==='Done'?100:status==='In Progress'?50:0,
          float:flt, dur:parseInt(row[colDur])||0,
          responsible:respList.join('; '),
          responsibleList:respList,
          totalQty:tq,
          unit:colUnit>=0&&row[colUnit]?String(row[colUnit]).trim():''
        });
    } else {
      pathStack[indent] = stripped;
    }
  }

  /* Build phase summaries */
  var phases=[], activities=[];
  var phOrder=['MOB','SD','P1','P2','P3','P4','P5','ML'];
  for (var pi=0; pi<phOrder.length; pi++) {
    var phId = phOrder[pi];
    var ph = PHASES_DEF.filter(function(p){return p.id===phId;})[0];
    var acts = phaseBuckets[phId]||[];
    if (!acts.length) continue;
    var done = acts.filter(function(a){return a.st==='Done';}).length;
    var ss = acts.map(function(a){return a.s;}).filter(Boolean);
    var fs = acts.map(function(a){return a.f;}).filter(Boolean);
    phases.push({
      id:phId, name:ph.name, order:ph.order, color:ph.color,
      s:ss.length?ss.reduce(function(a,b){return a<b?a:b;}):DATA_DATE,
      f:fs.length?fs.reduce(function(a,b){return a>b?a:b;}):DATA_DATE,
      progress:acts.length?Math.round(100*done/acts.length):0,
      status:done===acts.length?'Complete':done>0||acts.filter(function(a){return a.st==='In Progress';}).length?'In Progress':'Not Started'
    });
    for (var ai=0; ai<acts.length; ai++) activities.push(acts[ai]);
  }

  /* Map column headers from header row (find PROGRESS/STATUS/NOTE/TIME STAMP by name) */
  var colPc=-1, colSt=-1, colNote=-1;
  if(rows[0]){
    for(var ci=0;ci<rows[0].length;ci++){
      var h=rows[0][ci];
      if(h==null)continue;
      var hh=String(h).trim().toUpperCase();
      if(hh==='PROGRESS')colPc=ci;
      else if(hh==='STATUS')colSt=ci;
      else if(hh==='NOTE'||hh==='NOTES')colNote=ci;
    }
  }
  var actRowMap = {};
  for(var ri=1;ri<rows.length;ri++){
    var rId=rows[ri][0];
    if(rId!=null&&LEAF_RE.test(String(rId).trim()))actRowMap[String(rId).trim()]=ri;
  }
  for(var ai=0;ai<activities.length;ai++){
    var ri=actRowMap[activities[ai].id];
    if(ri!=null){
      var r=rows[ri];
      if(colSt>=0&&r[colSt])activities[ai].st=r[colSt];
      if(colPc>=0&&r[colPc]!=null&&r[colPc]!=='')activities[ai].pc=parseInt(r[colPc])||0;
      if(colNote>=0&&r[colNote])activities[ai].notes=r[colNote];
    }
  }

  return {phases:phases, activities:activities};
}

/* ══════════════════════════════════════════
   SHAREPOINT LIVE FETCH
══════════════════════════════════════════ */
function setLoadMsg(msg, pct) {
  var el=document.getElementById('ld-msg'); if(el) el.textContent=msg;
  var f=document.getElementById('ld-fill'); if(f) f.style.width=(pct||0)+'%';
}

async function fetchLive() {
  DS.state='loading'; DS.msg='Connecting to SharePoint…';
  setLoadMsg('Connecting to SharePoint…', 20);
  try {
    setLoadMsg('Looking up list…', 30);
    var token = await getGraphToken();
    if(!token)throw new Error('No Graph token');
    var ctx = listCtx();
    if(!ctx.siteUrl||!ctx.listName)throw new Error('No SharePoint list configured. Go to Profile → Set List URL.');
    if(!SITE_ID){
      var info=siteInfoFromShareUrl(ctx.siteUrl);
      if(!info)throw new Error('Invalid site URL');
      var res=await fetch(GRAPH_SITES_BASE+info.host+':'+info.path, {headers:{'Authorization':'Bearer '+token}});
      if(!res.ok)throw new Error('Site not found');
      var site=await res.json();
      SITE_ID=site.id;
    }
    setLoadMsg('Finding list…', 50);
    if(!SCHED_LIST_ID){
      var lres=await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists?$select=id,displayName', {headers:{'Authorization':'Bearer '+token}});
      if(!lres.ok)throw new Error('List lookup failed');
      var ldata=await lres.json();
      if(ldata.value){
        for(var i=0;i<ldata.value.length;i++){
          if(ldata.value[i].displayName===ctx.listName){SCHED_LIST_ID=ldata.value[i].id;break;}
        }
      }
    }
    if(!SCHED_LIST_ID){
      var names=(ldata&&ldata.value?ldata.value.map(function(l){return l.displayName;}).join(', '):'none found');
      throw new Error('List "'+ctx.listName+'" not found. Available lists: '+names);
    }
    setLoadMsg('Downloading activities…', 70);
    var items=[],url=GRAPH_SITES_BASE+SITE_ID+'/lists/'+SCHED_LIST_ID+'/items?expand=fields&$top=5000';
    while(url){
      var xres=await fetch(url, {headers:{'Authorization':'Bearer '+token}});
      if(!xres.ok)throw new Error('List fetch failed: '+xres.status);
      var xdata=await xres.json();
      if(xdata.value)items=items.concat(xdata.value);
      url=xdata['@odata.nextLink']||null;
    }
    if(!items.length)throw new Error('No activities found in list');
    setLoadMsg('Processing ' + items.length + ' items…', 85);
    /* Diagnose field names */
    if(items.length&&items[0].fields){
      var keys=Object.keys(items[0].fields).filter(function(k){return k!=='id'&&k!=='@odata.etag'&&k!=='ContentType';});
      console.log('[list] fields:', keys.join(', '));
      console.log('[list] sample:', JSON.stringify(items[0].fields).slice(0,800));
      showToast('Fields: '+keys.slice(0,15).join(', '));
    }
    AC = items.map(function(item){return listItemToActivity(item.fields, item.id);});
    ST._itemIdMap = {}; AC.forEach(function(a){if(a._listItemId)ST._itemIdMap[a.id]=a._listItemId;});
    var pmap={},order=0;
    AC.forEach(function(a){if(a.ph&&!pmap[a.ph]){pmap[a.ph]={id:a.ph,name:a.ph,order:order++,color:'#6B7280',s:null,f:null,progress:0,status:'In Progress'};}});
    PH = Object.keys(pmap).sort(function(a,b){return pmap[a].order-pmap[b].order;}).map(function(k){return pmap[k];});
    if(!PH.length)PH=[{id:'ALL',name:'All Activities',order:0,color:'#6B7280',s:null,f:null,progress:0,status:'In Progress'}];
    DS.state='live';
    DS.acts=AC.length;
    DS.ts=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    DS.msg='Live · '+ctx.listName+' · '+DS.ts;
    setLoadMsg('Schedule loaded ✓', 100);
  } catch(err) {
    DS.state='error';
    DS.error=err.message||'Fetch failed';
    AC=[];PH=[];ST._itemIdMap=null;
    throw err;
  }
}

async function refresh() {
  DS.state='loading'; DS.msg='Refreshing…';
  rProfile();
  try{
    await fetchLive();
    rToday(); rTimeline(); rProfile();
    showToast('✓ '+DS.acts+' activities updated');
  }catch(err){
    showToast('✗ '+DS.error);
  }
}

var LAST_CHECK = 0;
async function silentRefresh() {
  if (ST.selId) return;
  var oldLen = AC.length;
  try{
    await fetchLive();
    rToday(); rTimeline(); rProfile();
    if (AC.length !== oldLen) {
      showToast('✓ Schedule updated');
    }
  }catch(e){/* keep current data on silent fail */}
  LAST_CHECK = Date.now();
}

function stB(s){var k=sk(s);return'<span class="b b-'+k+'">'+s+'</span>';}
function dtB(d){if(!d)return'';if(d===DATA_DATE)return'<span class="b b-td">Due Today</span>';if(d<DATA_DATE)return'<span class="b b-ov">Overdue</span>';return'<span class="b b-dt">'+fd(d)+'</span>';}
function flB(f){if(f==null)return'';if(f<0)return'<span class="b b-ov">Overdue</span>';var c=f<5?'b-td':'b-c';return'<span class="b '+c+'">Float '+f+'d</span>';}
function qtyB(a){var ins=inspQty(a.id),rq=readyQty(a.id),rm=remQty(a.id);if(!rq&&!a.totalQty)return'';var t=a.totalQty?'/'+a.totalQty:'';return'<span class="b b-c">'+ins+t+' ready:'+rq+'</span>'+((rm>0&&ins>0)?'<span class="b b-td">'+rm+' left</span>':(rm<=0&&ins>0?'<span class="b b-dn" style="background:rgba(16,185,129,.15);color:var(--gr)">✓ Done</span>':''));}
function circInner(s){if(s==='Done')return I.chkW;if(s==='In Progress')return I.dot7;return'';}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Permission filtering ── */
function userEmail(){return AUTH.user&&AUTH.user.username?AUTH.user.username.toLowerCase():AUTH.user&&AUTH.user.idTokenClaims&&AUTH.user.idTokenClaims.preferred_username?AUTH.user.idTokenClaims.preferred_username.toLowerCase():AUTH.user&&AUTH.user.idTokenClaims&&AUTH.user.idTokenClaims.email?AUTH.user.idTokenClaims.email.toLowerCase():'';}
function userRole(){
  var e=userEmail();
  console.log('[role] userEmail:', JSON.stringify(e), 'ADMIN_EMAILS:', ADMIN_EMAILS, 'match:', ADMIN_EMAILS.indexOf(e)>=0||ADMIN_EMAILS.some(function(a){return e.indexOf(a)>=0||a.indexOf(e)>=0;}));
  if(!e)return'viewer';
  if(ADMIN_EMAILS.some(function(a){return e.indexOf(a)>=0||a.indexOf(e)>=0;}))return'admin';
  if(INSPECTOR_EMAILS.some(function(a){return e.indexOf(a)>=0||a.indexOf(e)>=0;}))return'inspector';
  return'user';
}
function visibleAC(){
  var role=userRole();
  console.log('[perm] role:', role, 'AC length:', AC.length, 'sample responsibleList:', AC[0]?AC[0].responsibleList:null);
  if(role==='admin'||role==='inspector'||role==='viewer')return AC;
  var e=userEmail();
  var r=AC.filter(function(a){
    if(!a.responsibleList||!a.responsibleList.length)return true;
    if(a.responsibleList.indexOf(e)>=0)return true;
    if(role==='inspector'&&effSt(a)==='For Inspection')return true;
    return false;
  });
  console.log('[perm] filtered:', r.length, 'of', AC.length);
  return r;
}
function visiblePH(){
  var ids={};visibleAC().forEach(function(a){ids[a.ph]=1;});
  return PH.filter(function(p){return ids[p.id];});
}
function permBanner(){
  var role=userRole();
  if(role==='viewer')return'';
  var v=visibleAC(),roleLabel=role==='admin'?'Admin':role==='inspector'?'Inspector':'User';
  var e=userEmail();
  return'<div style="margin:0 16px 8px;padding:8px 12px;background:rgba(59,130,246,.08);border-radius:8px;font-size:11px;color:var(--bl);display:flex;align-items:center;gap:6px">'+
    I.user+' '+roleLabel+' ('+e+') — showing '+v.length+' of '+AC.length+' activities · '+
    PH.length+' phases, '+(PH[0]?PH[0].id:'?')+', '+(PH[1]?PH[1].id:'?')+', '+(PH[2]?PH[2].id:'?')+
    '</div>';
}

/* connection banner */
function connBanner() {
  var state=DS.state;
  var cls=state==='live'?'live':state==='error'?'error':'loading';
  var ico=state==='live'?I.wifi:state==='loading'?'<span class="spin">'+I.ref+'</span>':I.wifi;
  var col=state==='live'?'var(--gr)':state==='error'?'var(--rd)':'var(--bl)';
  var txt=state==='live'?'Live · SharePoint · '+DS.ts:state==='loading'?'Connecting…':'Error';

          state==='loading'?'':

    '</div>'+btn+'</div>';
}

/* ══════════════════════════════════════════
   RENDER TODAY
══════════════════════════════════════════ */
function rToday(){
  var q=(ST.searchQ||'').toLowerCase();
  var vAC=visibleAC();
  var active=[];
  var tf=ST.todayFilter;
  for(var i=0;i<vAC.length;i++){
    var a=vAC[i];var st=effSt(a);
    var isActive=a.s<=DATA_DATE&&a.f>=DATA_DATE;
    var isOverdue=a.f<DATA_DATE&&st!=='Done'&&st!=='For Inspection'&&st!=='Partially Inspected';
    if(tf){
      if(tf==='Not Started'&&!(isActive&&st==='Not Started'))continue;
      else if(tf==='Overdue'&&!isOverdue)continue;
      else if(tf==='In Progress'&&!(isActive&&st==='In Progress'&&!isOverdue))continue;
      else if(tf==='For Inspection'&&st!=='For Inspection')continue;
      else if(tf==='Partially Inspected'&&st!=='Partially Inspected')continue;
      else if(tf==='Done'&&st!=='Done')continue;
    }else{
      if(st==='Done')continue;
      if(!isActive)continue;
    }
    if(!q||a.title.toLowerCase().indexOf(q)>-1||a.id.toLowerCase().indexOf(q)>-1||(a.disc||'').toLowerCase().indexOf(q)>-1)
      active.push(a);
  }
  var grp={};
  for(var i=0;i<active.length;i++){var a=active[i];if(!grp[a.ph])grp[a.ph]=[];grp[a.ph].push(a);}

  var h=connBanner()+permBanner()+
    '<div class="ph-hdr">'+
      '<div class="ph-date">'+(new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'}))+'</div>'+
      '<div class="ph-title">'+(tf||'Active Activities')+'</div>'+
    '</div>'+
    '<div class="sw-wrap"><div class="sw-box">'+I.srch+
      '<input type="text" name="search-today" placeholder="Search by name, ID, discipline…" value="'+escH(ST.searchQ)+
      '" oninput="ST.searchQ=this.value;rToday()" autocomplete="off" autocorrect="off" spellcheck="false">'+
    '</div></div>';

  if(ST.banner){
    h+='<div class="notif'+(ST.banner?'':' gone')+'" id="notif">'+
      '<div class="n-ico">'+I.bell+'</div>'+
      '<div class="n-body"><b>P6 Update — 3 Jun 2026</b><s>'+active.length+' activity'+(active.length!==1?'ies':'')+' · Project float: −49 days</s></div>'+
      '<button class="n-x" onclick="event.stopPropagation();dimB()">'+I.x+'</button></div>';
  }
  /* KPI counts from all visible activities */
  var kNs=0,kOv=0,kIp=0,kFi=0,kPi=0,kDn=0;
  for(var i=0;i<vAC.length;i++){var a=vAC[i],s=effSt(a),isActive=a.s<=DATA_DATE&&a.f>=DATA_DATE,isOverdue=a.f<DATA_DATE&&s!=='Done'&&s!=='For Inspection'&&s!=='Partially Inspected';
    if(isActive&&s==='Not Started')kNs++;
    if(isOverdue)kOv++;
    if(isActive&&s==='In Progress'&&!isOverdue)kIp++;
    if(s==='For Inspection')kFi++;
    if(s==='Partially Inspected')kPi++;
    if(s==='Done')kDn++;}
  var kpis=[
    {k:'Not Started',c:'#9CA3AF',v:kNs},
    {k:'Overdue',c:'#EF4444',v:kOv},
    {k:'In Progress',c:'#60A5FA',v:kIp},
    {k:'For Inspection',c:'#F87171',v:kFi},
    {k:'Partially Inspected',c:'#F59E0B',v:kPi},
    {k:'Done',c:'#34D399',v:kDn}
  ];
  h+='<div class="kpis">';
  for(var ki=0;ki<kpis.length;ki++){
    var kp=kpis[ki];
    var sel=ST.todayFilter===kp.k;
    h+='<div class="kpi'+(sel?' kpi-on':'')+'" style="'+(sel?'border-color:'+kp.c:'')+';color:'+kp.c+'" onclick="setTodayFilter(\''+kp.k+'\')">'+
      '<div class="kv">'+kp.v+'</div><div class="kl">'+kp.k.replace(/ /g,'<br>')+'</div></div>';
  }
  h+='</div>'+(ST.todayFilter?'<div style="padding:0 16px 8px;font-size:10px;color:var(--t3)">Filtered: '+ST.todayFilter+' · <a href="#" onclick="ST.todayFilter=\'\';rToday();return false" style="color:var(--a);text-decoration:none">Clear</a></div>':'');

  var phOrder=['MOB','SD','P1','P2','P3','P4','P5','ML'];
  var shown=false;
  for(var pi=0;pi<phOrder.length;pi++){
    var phId=phOrder[pi];if(!grp[phId])continue;
    var ph=phOf(phId);shown=true;
    var c=ph?ph.color:(COL[phId]||'#8B9BB4');
      h+='<div class="pg-sec"><div class="pg-dot" style="background:'+c+'"></div>'+
        '<div class="pg-nm">'+(ph?ph.name:phId)+'</div>'+
        '<div class="pg-ct">'+grp[phId].length+'</div></div>';
    for(var j=0;j<grp[phId].length;j++)h+=buildCard(grp[phId][j]);
  }
  if(!shown)h+='<div style="text-align:center;padding:40px 20px;color:var(--t3)">'+
    I.ckGr.replace(/14/g,'40')+
    '<div style="font-family:var(--FD);font-size:16px;font-weight:700;color:var(--t1);margin-top:10px">'+(q?'No matches':tf?'No '+tf+' activities':'All clear!')+'</div>'+
    '<div style="font-size:13px;margin-top:4px">'+(q?'Try different keywords':tf?'Tap another KPI or clear filter':'No activities due on data date')+'</div></div>';
  h+='<div style="height:24px"></div>';
  var el=document.getElementById('s-today');if(el)el.innerHTML=h;
}

function buildCard(a){
  var st=effSt(a),pc=effPc(a),k=sk(st),c=COL[a.ph]||'#8B9BB4';
  return'<div class="card'+(st==='Done'?' fade-c':'')+'" onclick="openSheet(\''+a.id+'\')" style="border-left:none">'+
    '<div class="stripe" style="background:'+c+'"></div>'+
    '<div class="crow">'+
      '<div class="circ ci-'+k+'" style="border-color:'+(k==='dn'?'#10B981':k==='pi'?'#F59E0B':k==='ip'?'#3B82F6':k==='fi'?'#F87171':'rgba(255,255,255,.13)')+'" onclick="event.stopPropagation();cycSt(\''+a.id+'\')">'+circInner(st)+'</div>'+
      '<div class="cinfo">'+
        '<div class="ctit">'+escH(a.title)+'</div>'+
        (a.disc?'<div class="cdisc">'+escH(a.disc)+'</div>':'')+
        '<div class="cbdgs">'+stB(st)+dtB(a.f)+flB(a.float)+qtyB(a)+'</div>'+
        (pc>0&&pc<100?'<div class="cpbar"><div class="cpfill" style="width:'+pc+'%;background:'+c+'"></div></div>':'')+
      '</div>'+
      '<div style="color:var(--t3);flex-shrink:0;margin-top:2px">'+I.chv+'</div>'+
    '</div></div>';
}

/* ══════════════════════════════════════════
   RENDER TIMELINE
══════════════════════════════════════════ */
function rTimeline(){
  var q=(ST.searchQ||'').toLowerCase();
  var vAC=visibleAC();
  var total=vAC.length,done_t=0;
  for(var i=0;i<vAC.length;i++)if(effSt(vAC[i])==='Done')done_t++;
  var ovr=total?Math.round(100*done_t/total):0;
  var phOrder=['MOB','SD','P1','P2','P3','P4','P5','ML'];

  var h=connBanner()+permBanner()+
    '<div style="padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between">'+
      '<div style="font-family:var(--FD);font-size:22px;font-weight:800;letter-spacing:-.4px">P6 Schedule</div>'+
      '<div style="font-size:11px;font-weight:700;color:var(--t3);background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:5px 10px">EMSL-15</div>'+
    '</div>'+
    '<div class="sw-wrap"><div class="sw-box">'+I.srch+
      '<input type="text" name="search-timeline" placeholder="Filter by name, ID, discipline…" value="'+escH(ST.searchQ)+
      '" oninput="ST.searchQ=this.value;rTimeline()" autocomplete="off" autocorrect="off" spellcheck="false">'+
    '</div></div>'+
    '<div class="ovr">'+
      '<div class="ovr-r"><span class="ovr-lbl">Overall Progress'+(vAC.length!==AC.length?' · '+vAC.length+' of '+AC.length+' activities':' · '+AC.length+' activities')+'</span><span class="ovr-pct">'+ovr+'%</span></div>'+
      '<div class="ovr-bar"><div class="ovr-fill" style="width:'+ovr+'%"></div></div>'+
      '<div class="ovr-dates"><span>Oct 2025</span><span>Jun 2027</span></div>'+
      '<div class="ph-pills">';
  for(var pi=0;pi<phOrder.length;pi++){
    var ph=phOf(phOrder[pi]);if(!ph)continue;
    h+='<div class="ph-pill" title="'+ph.name+'"><div class="ph-pill-bg"></div>'+
      '<div class="ph-pill-fill" style="background:'+ph.color+';width:'+ph.progress+'%"></div></div>';
  }
  h+='</div></div>';

  /* Build visible phases set */
  var vPhIds={};
  for(var i=0;i<vAC.length;i++)vPhIds[vAC[i].ph]=1;

  for(var pi=0;pi<phOrder.length;pi++){
    var phId=phOrder[pi],ph=phOf(phId);if(!ph)continue;
    if(!vPhIds[phId]&&!q)continue;
    var acts=[];
    for(var i=0;i<vAC.length;i++){
      var a=vAC[i];if(a.ph!==phId)continue;
      if(q&&a.title.toLowerCase().indexOf(q)===-1&&a.id.toLowerCase().indexOf(q)===-1&&(a.disc||'').toLowerCase().indexOf(q)===-1)continue;
      acts.push(a);
    }
    if(!acts.length&&q)continue;
    var done=0,ip=0;
    for(var i=0;i<acts.length;i++){var s=effSt(acts[i]);if(s==='Done')done++;if(s==='In Progress')ip++;}
    var open=!!ST.openPh[phId],sc=ph.color;
    var icoStyle=ph.progress>=100?'background:rgba(16,185,129,.12);color:#10B981':ip>0||done>0?'background:'+sc+'22;color:'+sc:'background:rgba(255,255,255,.05);color:var(--t3)';

    h+='<div class="acc'+(open?' open':'')+'" id="acc-'+phId+'">'+
      '<div class="acc-hd" onclick="togPh(\''+phId+'\')">'+
        '<div class="acc-ico" style="'+icoStyle+'">'+I.zap+'</div>'+
        '<div class="acc-info"><div class="acc-name">'+ph.name+'</div>'+
          '<div class="acc-sub">'+fd(ph.s)+' → '+fd(ph.f)+' · '+done+'/'+acts.length+' done</div></div>'+
        '<div class="acc-rt">'+
          (ph.progress?'<span class="acc-pct" style="color:'+sc+'">'+ph.progress+'%</span>':'')+
          '<div class="acc-chv">'+I.chv+'</div>'+
        '</div>'+
      '</div>'+
      (ph.progress?'<div class="acc-prog"><div style="height:100%;width:'+ph.progress+'%;background:'+sc+'"></div></div>':'')+
      '<div class="acc-body">';

    var discMap={},discOrder=[];
    for(var i=0;i<acts.length;i++){
      var disc=acts[i].disc||'';
      if(!discMap[disc]){discMap[disc]=[];discOrder.push(disc);}
      discMap[disc].push(acts[i]);
    }
    for(var di=0;di<discOrder.length;di++){
      var disc=discOrder[di],da=discMap[disc];
      var dDone=da.filter(function(a){return effSt(a)==='Done';}).length;
      if(disc)h+='<div class="disc-hd"><div class="disc-dot" style="background:'+sc+'"></div>'+
        '<div class="disc-nm">'+escH(disc)+'</div><div class="disc-ct">'+dDone+'/'+da.length+'</div></div>';
      for(var i=0;i<da.length;i++){
        var a=da[i],ast=effSt(a),ak=sk(ast);
        h+='<div class="acc-row" onclick="openSheet(\''+a.id+'\')">'+
          '<div class="a-dot '+ak+'">'+(ast==='Done'?I.chkW:'')+'</div>'+
          '<div class="a-ri"><div class="a-rt">'+escH(a.title)+'</div>'+
          '<div class="a-rm">'+a.id+' · '+fd(a.s)+' → '+fd(a.f)+(a.float!=null?' · '+(a.float<0?'Overdue':'Float:'+a.float+'d'):'')+'</div></div>'+
          I.chvR+'</div>';
      }
    }
    h+='</div></div>';
  }
  h+='<div style="height:24px"></div>';
  var el=document.getElementById('s-timeline');if(el)el.innerHTML=h;
}

async function syncAll(){
  if(ST.syncing)return;
  ST.syncing=true;
  try{
    if(!ST._itemIdMap)return;
    showToast('Syncing pending changes…');
    var token = await getGraphToken();
    if(!token)return;
    var ids = Object.keys(ST.overrides);
    if(!ids.length)return;
    var synced=0,failed=0,now=new Date().toISOString();
    for(var si=0;si<ids.length;si++){
      var id=ids[si],o=ST.overrides[id];
      if(!o||!ST._itemIdMap[id]){failed++;continue;}
      var itemId=ST._itemIdMap[id];
      var fields={
        STATUS:o.st||'Not Started',
        NOTE:o.notes||'',
        TIME_x0020_STAMP:now
      };
      if(o.responsibleList)fields.responsible=o.responsibleList.join('; ');
      if(o.st==='For Inspection'){
        var resp=(o.responsibleList?o.responsibleList.join('; '):'').trim();
        if(resp.toLowerCase().indexOf(INSPECT_EMAIL)<0)
          fields.responsible=resp?resp+', '+INSPECT_EMAIL:INSPECT_EMAIL;
        else
          fields.responsible=resp;
      }
      var ok=await updateListItem(token, itemId, fields);
      if(ok)synced++; else failed++;
    }
    if(synced>0){
      ST.syncQ=0;updBadge();
      showToast('✓ Synced '+synced+' activity'+(synced>1?'ies':'y')+(failed?' ('+failed+' failed)':''));
    } else {
      showToast('No changes to sync');
    }
  }catch(e){console.error('[sync] batch error:', e);showToast('Sync error: '+e.message);}
  finally{ST.syncing=false;try{rProfile();}catch(e){}}
}

async function testGraph(){
  showToast('Testing Graph…');
  var ctx=listCtx();
  if(!ctx){showToast('No list configured — paste URL first');return;}
  var token=await getGraphToken();
  if(!token){showToast('No token');return;}
  try{
    if(!SITE_ID){
      var info=siteInfoFromShareUrl(ctx.siteUrl);
      if(!info)throw new Error('Bad site URL');
      var res=await fetch(GRAPH_SITES_BASE+info.host+':'+info.path, {headers:{'Authorization':'Bearer '+token}});
      if(!res.ok)throw new Error('Site '+res.status);
      var site=await res.json();
      SITE_ID=site.id;
    }
    if(!SCHED_LIST_ID){
      var lres=await fetch(GRAPH_SITES_BASE+SITE_ID+'/lists?$select=id,displayName', {headers:{'Authorization':'Bearer '+token}});
      if(!lres.ok)throw new Error('List lookup '+lres.status);
      var ldata=await lres.json();
      if(ldata.value){for(var i=0;i<ldata.value.length;i++){if(ldata.value[i].displayName===ctx.listName){SCHED_LIST_ID=ldata.value[i].id;break;}}}
    }
    if(!SCHED_LIST_ID){
      var names=(ldata&&ldata.value?ldata.value.map(function(l){return l.displayName;}).join(', '):'none found');
      throw new Error('List "'+ctx.listName+'" not found. Available: '+names);
    }
  }catch(e){showToast('✗ '+e.message);}
}
/* Parse SharePoint list URL to extract site URL and list name */
function parseListUrl(url){
  try{
    var u=new URL(url);
    /* Format: /sites/{site}/Lists/{name}/AllItems.aspx */
    var m=u.pathname.match(/\/sites\/([^\/]+)\/Lists\/([^\/]+)/i);
    if(m) return {siteUrl:'https://'+u.hostname+'/sites/'+m[1], listName:decodeURIComponent(m[2]).replace(/\.aspx$/i,'')};
    /* Format: /:l:/s/{site}/{garbage} (sharing link) */
    var m2=u.pathname.match(/\/:l:\/s\/([^\/]+)/i);
    if(m2) return {siteUrl:'https://'+u.hostname+'/sites/'+m2[1], listName:''};
    return null;
  }catch(e){return null;}
}

function connectList(){

  var nameEl=document.getElementById('list-name-input');
  if(!urlEl||!urlEl.value.trim()){showToast('Paste a SharePoint list URL');return;}

function disconnectList(){

async function saveToExcel(id, st, pc, notes, quiet){
  if(!ST._itemIdMap||!ST._itemIdMap[id]){console.log('[sync] no list item mapping for', id);if(!quiet)showToast('Activity not found in list');return false;}
  var itemId=ST._itemIdMap[id];
  var token=await getGraphToken();
  if(!token)return false;
  var o=ST.overrides[id];
  var fields={
    STATUS:st,
    NOTE:notes||'',
    TIME_x0020_STAMP:new Date().toISOString()
  };
  var resp=(o&&o.responsibleList?o.responsibleList.join('; '):'').trim();
  if(st==='For Inspection'){
    if(resp.toLowerCase().indexOf(INSPECT_EMAIL)<0)
      fields.responsible=resp?resp+', '+INSPECT_EMAIL:INSPECT_EMAIL;
    else
      fields.responsible=resp;
  } else {
    if(resp)fields.responsible=resp;
  }
  var ok=await updateListItem(token, itemId, fields);
  if(ok){ST.syncQ=Math.max(0,ST.syncQ-1);updBadge();if(!quiet)showToast('✓ Synced to SharePoint');return true;}
  else{if(!quiet)showToast('Sync failed');return false;}
}

async function saveSheet(id){
  var notes=document.getElementById('shno')?document.getElementById('shno').value:'';
  if(getPhoto(id)&&notes.indexOf('📷')<0)notes='📷 Photo attached\n'+notes;
  if(!ST.overrides[id])ST.overrides[id]={};
  ST.overrides[id].st=ST.shSt;ST.overrides[id].pc=ST.shPc;ST.overrides[id].notes=notes;
  saveOverrides();ST.syncQ++;updBadge();closeSheet();
  if(ST.tab==='today')rToday();else if(ST.tab==='timeline')rTimeline();
  var a=acOf(id),finalSt=ST.overrides[id].st,finalPc=ST.overrides[id].pc;
  if(finalSt==='For Inspection')sendInspectionEmail(id, a?a.title:'');
  else if(finalSt==='Partially Inspected'||finalSt==='Done')sendReadyEmail(id, a?a.title:'');
  await saveToExcel(id, finalSt, finalPc, notes);
  if(ST.syncQ>0)setTimeout(syncAll,3000);
}
async function getMailToken(){
  if(!AUTH.instance||!AUTH.user)return null;
  try{
    var resp=await AUTH.instance.acquireTokenSilent({scopes:[MAIL_SCOPE],account:AUTH.user});
    return resp.accessToken;
  }catch(e){
    console.log('[mail] silent failed',e);
    try{
      var resp=await AUTH.instance.acquireTokenPopup({scopes:[MAIL_SCOPE],account:AUTH.user});
      return resp.accessToken;
    }catch(e2){console.log('[mail] popup failed',e2);return null;}
  }
}
async function sendInspectionEmail(id,title){
  var token=await getMailToken();
  if(!token){showToast('Sign in to send email');return;}
  var a=acOf(id),tot=a?a.totalQty||0:0,ins=inspQty(id),rq=readyQty(id);
  var dateStr=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  var body='<b>Task:</b> '+escH(title||id)+'<br><b>ID:</b> '+id+'<br><b>Date:</b> '+dateStr+'<br><br><b>Inspection Quantity</b><br>'+
    'Total: '+tot+' '+(a&&a.unit||'')+'<br>Ready: '+rq+'<br>Inspected: '+ins+'<br>Remaining: '+Math.max(0,rq-ins)+'<br><br><b>Inspection History</b><br>';
  var hist=ST.overrides[id]&&ST.overrides[id].ins?ST.overrides[id].ins:[];
  if(hist.length){
    for(var hi=0;hi<hist.length;hi++){
      var hh=hist[hi];var hd=new Date(hh.d);
      body+= (hh.r==='Passed'?'✓':'✗')+' '+hh.q+' — '+pad(hd.getDate())+'/'+pad(hd.getMonth()+1)+' '+pad(hd.getHours())+':'+pad(hd.getMinutes())+'<br>';
    }
  }else{body+='No inspection entries yet<br>';}
  var msg={subject:'Inspection Required: '+escH(title||id),body:{contentType:'HTML',content:body},toRecipients:[{emailAddress:{address:NOTIFY_EMAIL}}]};
  var photo=getPhoto(id);
  console.log('[mail] sendInspection getPhoto('+id+'):',photo?'found ('+photo.length+' chars)':'null');
  if(photo){
    var parts=photo.split(','),mime=parts[0].split(':')[1].split(';')[0]||'image/jpeg';
    msg.attachments=[{'@odata.type':'#microsoft.graph.fileAttachment',name:'photo.'+(mime.split('/')[1]||'jpg'),contentBytes:parts[1].replace(/\s/g,''),contentType:mime}];
  }
  var payload={message:msg,saveToSentItems:true};
  try{
    var res=await fetch('https://graph.microsoft.com/v1.0/me/sendMail',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(res.ok)showToast('✓ Email sent to '+NOTIFY_EMAIL+(photo?' with photo':''));
    else{var et=await res.text();console.log('[mail] send error:',res.status,et);showToast('Failed to send email');}
  }catch(e){console.log('[mail] fetch error:',e);showToast('Failed to send email');}
}
async function sendReadyEmail(id,title){
  var token=await getMailToken();
  if(!token)return;
  var a=acOf(id),ins=inspQty(id);
  var body='<b>Task:</b> '+escH(title||id)+'<br><b>ID:</b> '+id+'<br><b>Inspected Qty:</b> '+ins+' '+(a&&a.unit||'')+
    '<br><br>The inspected quantity is ready and WIR to be issued from Aconex for SDC inspection.';
  var msg={subject:'Ready for SDC Inspection: '+escH(title||id),body:{contentType:'HTML',content:body},toRecipients:[{emailAddress:{address:NOTIFY_EMAIL}}]};
  var photo=getPhoto(id);
  console.log('[mail] getPhoto('+id+'):',photo?'found ('+photo.length+' chars)':'null');
  if(photo){
    var parts=photo.split(','),mime=parts[0].split(':')[1].split(';')[0]||'image/jpeg';
    var cleanBytes=parts[1].replace(/\s/g,'');
    console.log('[mail] attachment parts[0]:',parts[0],'mime:',mime,'bytes len:',cleanBytes.length);
    msg.attachments=[{'@odata.type':'#microsoft.graph.fileAttachment',name:'photo.'+(mime.split('/')[1]||'jpg'),contentBytes:cleanBytes,contentType:mime}];
  }
  var payload={message:msg,saveToSentItems:true};
  try{
    var res=await fetch('https://graph.microsoft.com/v1.0/me/sendMail',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(res.ok)showToast('✓ Ready email sent'+(photo?' with photo':''));
    else{var et=await res.text();console.log('[mail] send error:',res.status,et);showToast('Failed to send ready email');}
  }catch(e){console.log('[mail] fetch error:',e);showToast('Failed to send ready email');}
}
function attachPhoto(){
  var el=document.getElementById('photo-input');
  if(!el)return;
  el.click();
  el.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=800,c=document.createElement('canvas'),r=Math.min(max/img.width,max/img.height,1);
        c.width=img.width*r;c.height=img.height*r;
        var x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);
        var dataUrl=c.toDataURL('image/jpeg',0.7);
        if(ST.selId){storePhoto(ST.selId,dataUrl);showToast('✓ Photo attached');rSheet();}
        el.value='';
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
}
function rSheet(){if(ST.selId)openSheet(ST.selId);}
function showPhoto(src){
  var po=document.createElement('div');
  po.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer';
  po.onclick=function(){po.remove();};
  var img=document.createElement('img');
  img.src=src;
  img.style.cssText='max-width:95%;max-height:95%;border-radius:12px;object-fit:contain';
  po.appendChild(img);
  document.body.appendChild(po);
}

document.getElementById('file-input').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  showToast('Reading '+file.name+'…');
  if(typeof XLSX==='undefined'){showToast('Error: SheetJS not loaded');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var parsed=parseP6Buffer(ev.target.result);
      if(!parsed.activities.length)throw new Error('No activities parsed');
      PH=parsed.phases;AC=parsed.activities;ST.overrides={};
      FILE_NAME=file.name;DS.state='live';DS.acts=AC.length;
      DS.ts='from file';DS.error='';
      rToday();rTimeline();rProfile();
      showToast('✓ Loaded '+AC.length+' activities from '+file.name);
    }catch(err){showToast('Parse error: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
});

function go(t){
  var p=ST.tab;
  document.getElementById('t-'+p).classList.remove('on');
  document.getElementById('s-'+p).classList.remove('active');
  ST.tab=t;ST.searchQ='';ST.todayFilter='';
  document.getElementById('t-'+t).classList.add('on');
  document.getElementById('s-'+t).classList.add('active');
  if(t==='today')rToday();else if(t==='timeline')rTimeline();else rProfile();
}
var CYCLE=['Not Started','In Progress','For Inspection','Partially Inspected','Done'];
function cycSt(id){
  var a=acOf(id);if(!a)return;
  var cur=effSt(a),nxt=CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
  if(!ST.overrides[id])ST.overrides[id]={};
  ST.overrides[id].st=nxt;ST.overrides[id].pc=nxt==='Done'?100:nxt==='Not Started'?0:50;
  saveOverrides();ST.syncQ++;updBadge();
  if(ST.tab==='today')rToday();else if(ST.tab==='timeline')rTimeline();else rProfile();
  showToast('→ '+nxt);
}
function setTodayFilter(k){ST.todayFilter=ST.todayFilter===k?'':k;rToday();}
function dimB(){ST.banner=false;var b=document.getElementById('notif');if(b)b.classList.add('gone');}
function togPh(id){ST.openPh[id]=!ST.openPh[id];var el=document.getElementById('acc-'+id);if(el)el.classList.toggle('open');}

function updBadge(){var b=document.getElementById('sqb');if(!b)return;b.textContent=ST.syncQ;b.style.display=ST.syncQ>0?'block':'none';if(ST.tab==='profile')rProfile();}
function clearSyncQ(){ST.syncQ=0;updBadge();if(ST.tab==='profile')rProfile();showToast('✓ Pending sync queue cleared');}
function showToast(msg){

(async function(){
  /* Wait for MSAL to init */
  await new Promise(function(res){var i=setInterval(function(){if(AUTH.instance||typeof msal!=='undefined'){clearInterval(i);res();}},50);});
  /* Wait for handleRedirectPromise to settle (avoids login flash during redirect) */
  if(AUTH._redirectResolved)await AUTH._redirectResolved;

  /* If the redirect handler already fetched data and rendered, we're done */
  if(AUTH._doneRedirect){_maseel_ready=2;setTimeout(killLoader,200);return;}

  /* If no user → show login screen, block app */
  if(!AUTH.user){
    showLoginScreen(); killLoader();
    return;
  }
  hideLoginScreen();

  /* Attempt live SharePoint fetch via Graph API */
  setLoadMsg('Connecting to SharePoint…', 10);
  try{
    await fetchLive();
  }catch(e){
    showToast('Could not load schedule: '+DS.error);
  }

  /* Initial render */
  try{rToday();}catch(e){}
  try{rTimeline();}catch(e){}
  try{rProfile();}catch(e){}

  /* Hide loader */
  setTimeout(killLoader, 400);
  _maseel_ready = 2;

  /* Auto-poll every 60 seconds */
  setInterval(silentRefresh, 60000);

  /* Refresh when tab becomes visible again (if >30s since last check) */
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && Date.now() - LAST_CHECK > 30000) {
      silentRefresh();
    }
  });
})().catch(function(){
  killLoader();
});
